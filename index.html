<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Minh Phần Thưởng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f1115; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: #1a1d24; padding: 40px; border-radius: 16px; max-width: 400px; width: 100%; border: 1px solid #2d323f; }
        .icon { font-size: 50px; margin-bottom: 15px; }
        h1 { color: #5865F2; font-size: 24px; margin: 0 0 10px 0; }
        p { color: #9ca3af; font-size: 14px; line-height: 1.5; margin-bottom: 30px; }
        .btn { color: white; border: none; padding: 16px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .btn-oauth { background: #5865F2; }
        .btn-claim { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn:disabled { background: #374151 !important; color: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon" id="webIcon">🔗</div>
    <h1 id="webTitle">Yêu Cầu Xác Minh</h1>
    <p id="webDesc">Vui lòng bấm nút bên dưới để liên kết tài khoản Discord của bạn với hệ thống và nhận thưởng.</p>
    <button class="btn btn-oauth" id="actionBtn">LIÊN KẾT DISCORD</button>
</div>

<script>
    const oauth2Url = "https://discord.com/oauth2/authorize?client_id=1401137325043617922&response_type=code&redirect_uri=https%3A%2F%2Fhphonggg.github.io%2Fnhanthuong%2F&scope=identify";
    
    // Phân loại Webhook chuẩn theo yêu cầu của bạn
    const webhookLienKet = "https://discord.com/api/webhooks/1507661372471902278/j4cT8FtQUALGpKHRNBAG2aVLr4Up4EcVQOOt91DMHclsF2ZLcxr_GVgmTKM4LnvAkLNj";
    const webhookVuotThanhCong = "https://discord.com/api/webhooks/1507661375244075061/XS1DiHi-LCRkAjQRrG3UrvztqS3gMPgv8ArN3rwseZw7FktEDoD5lMMMvfyOCcw8PFfG";

    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userid');
    const urlMsgId = urlParams.get('msgid');
    const code = urlParams.get('code');

    if (urlUserId) localStorage.setItem('saved_userid', urlUserId);
    if (urlMsgId) localStorage.setItem('saved_msgid', urlMsgId);

    const activeUserId = urlUserId || localStorage.getItem('saved_userid');
    const activeMsgId = urlMsgId || localStorage.getItem('saved_msgid');

    const button = document.getElementById('actionBtn');
    const title = document.getElementById('webTitle');
    const icon = document.getElementById('webIcon');
    const desc = document.getElementById('webDesc');

    async function sendLog(url, embedData) {
        try {
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ embeds: [embedData] })
            });
        } catch(e) { console.error(e); }
    }

    function xuLyGiaoDien() {
        if (!activeUserId) {
            title.innerText = "Lỗi Đường Link";
            desc.innerText = "Đường link thiếu thông tin ID người dùng. Vui lòng lấy lại link từ Discord.";
            button.innerText = "LINK KHÔNG HỢP LỆ";
            button.disabled = true;
            return;
        }

        const daXacMinh = localStorage.getItem(`da_xac_minh_${activeUserId}`);

        if (code) {
            icon.innerText = "⏳";
            title.innerText = "Đang Lưu Liên Kết...";
            button.innerText = "ĐANG XỬ LÝ...";
            button.disabled = true;

            localStorage.setItem(`da_xac_minh_${activeUserId}`, "true");

            // Bắn log về kênh "log người bấm liên kết"
            sendLog(webhookLienKet, {
                title: "🟢 TÀI KHOẢN LIÊN KẾT OAUTH2",
                color: 65280,
                fields: [
                    { name: "👤 Thành viên", value: `<@${activeUserId}>`, inline: true },
                    { name: "🆔 ID Người dùng", value: `\`${activeUserId}\``, inline: true },
                    { name: "🔑 Mã Code", value: `\`${code}\`` }
                ],
                timestamp: new Date()
            });

            setTimeout(() => {
                alert("🎉 Liên kết tài khoản Discord thành công!");
                window.location.href = "https://hphonggg.github.io/nhanthuong/";
            }, 1000);
        } 
        else if (daXacMinh === "true") {
            icon.innerText = "💰";
            title.innerText = "Tài Khoản Đã Xác Minh!";
            title.style.color = "#2ecc71";
            desc.innerText = "Hệ thống ghi nhận bạn đã liên kết Discord. Hãy nhấn nút dưới đây để hệ thống tự động cộng thưởng.";
            
            button.className = "btn btn-claim";
            button.innerText = "NHẬN THƯỞNG NGAY";
            button.disabled = false;
            
            button.onclick = async function() {
                button.disabled = true;
                button.innerText = "ĐANG GỬI THƯỞNG...";

                // Bắn tín hiệu kèm log về kênh "log vượt link thành công"
                await fetch(webhookVuotThanhCong, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: `||AUTO_CLAIM_SUCCESS:${activeUserId}:${activeMsgId}||`,
                        embeds: [{
                            title: "💰 LOG VƯỢT LINK THÀNH CÔNG (TỪ WEB)",
                            color: 1752220,
                            fields: [
                                { name: "👤 Người vượt", value: `<@${activeUserId}>`, inline: true },
                                { name: "🆔 ID", value: `\`${activeUserId}\``, inline: true },
                                { name: "💵 Số tiền", value: "`+300đ`" }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                alert("🎉 Nhận thưởng thành công! Hệ thống đang tự động xử lý cập nhật.");
                title.innerText = "Hoàn Thành!";
                icon.innerText = "✨";
                desc.innerText = "Hệ thống đã ghi nhận. Bạn có thể đóng trình duyệt và quay lại Discord gõ /sodu.";
                button.innerText = "ĐỀU ĐÃ HOÀN TẤT";
            };
        } 
        else {
            button.onclick = function() { window.location.href = oauth2Url; };
        }
    }

    xuLyGiaoDien();
</script>
</body>
</html>
