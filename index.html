<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhận Thưởng - YeuMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: linear-gradient(135deg, #0f172a, #1e2937); 
    }
    .glass { 
      background: rgba(255,255,255,0.08); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255,255,255,0.1); 
    }
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
  <div class="max-w-md w-full glass rounded-3xl p-10 shadow-2xl text-center">
    
    <div class="mb-10">
      <i class="fas fa-gift text-6xl text-yellow-400 mb-4"></i>
      <h1 class="text-3xl font-bold">Nhận Thưởng</h1>
      <p class="text-gray-400 mt-2">Nhấn nút bên dưới để nhận thưởng</p>
    </div>

    <!-- Nút Nhận Thưởng -->
    <button onclick="claimReward()" 
            class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 
                   transition-all py-5 rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-3 text-black">
      <i class="fas fa-hand-holding-dollar text-2xl"></i>
      NHẬN THƯỞNG
    </button>

    <div id="result" class="hidden mt-8 glass rounded-2xl p-6"></div>

  </div>

  <script>
    async function claimReward() {
      const resultDiv = document.getElementById('result');
      
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `
        <div class="text-center py-4">
          <div class="animate-spin w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-4"></div>
          <p class="text-lg">Đang xử lý yêu cầu nhận thưởng...</p>
        </div>
      `;

      try {
        // Giả lập thời gian xử lý (bạn có thể thay bằng API thật sau)
        await new Promise(resolve => setTimeout(resolve, 1800));

        resultDiv.innerHTML = `
          <div class="text-center">
            <i class="fas fa-check-circle text-6xl text-green-400 mb-4"></i>
            <p class="text-2xl font-semibold text-green-400">Thành công!</p>
            <p class="mt-3 text-gray-300">Yêu cầu nhận thưởng đã được ghi nhận.</p>
            <p class="text-sm text-gray-400 mt-6">Vui lòng chờ duyệt từ hệ thống.</p>
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <p class="text-red-400 text-center">❌ Có lỗi xảy ra. Vui lòng thử lại sau.</p>
        `;
      }
    }
  </script>
</body>
</html>
